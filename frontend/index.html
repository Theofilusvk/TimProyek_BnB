<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Pemilihan Tim Proyek</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h2>Pemilihan Tim</h2>

  <label>n (jumlah kandidat)
    <input type="number" id="n" value="" oninput="generateCandidateInputs()" min="1">
  </label>
  <label>k (ukuran tim)
    <input type="number" id="k" value="">
  </label>
  <label>B (batas anggaran)
    <input type="number" id="budget" value="">
  </label>
  <label>Biaya tiap kandidat
    <div id="candidate-inputs" class="candidate-grid"></div>
  </label>

  <div class="btns">
    <button onclick="solve()">Jalankan B&B</button>
    <button onclick="testDummy()">Test Dummy</button>
  </div>

  <div id="hasil"></div>

  <script src="app.js"></script>
</body>

</html>
